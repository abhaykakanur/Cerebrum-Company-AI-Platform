# ==============================================================================
# Cerebrum — Redis configuration (local development)
#
# Redis serves as cache, session store, rate-limit counters, and the Celery
# broker (docs/architecture/specification/42_Database_Responsibilities.md).
# Per that document's binding constraint, Redis is NEVER the sole copy of a
# durable business fact — appendonly persistence here is a convenience for
# local development continuity (surviving a container restart), not a
# durability guarantee the architecture depends on.
#
# requirepass is intentionally NOT set here — it is passed at container
# start via the compose file's `command` override so it can be sourced from
# the environment (REDIS_PASSWORD) rather than hardcoded in a committed file.
# ==============================================================================

# --- Persistence (convenience only, not a durability guarantee) --------------
appendonly yes
appendfsync everysec

# --- Memory management ---------------------------------------------------
# Bounded for local development; production sizing is Deferred to
# Architecture per docs/architecture/specification/40_Open_Questions.md,
# Open Question 61 (per-tenant Redis resource quotas).
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- Networking ------------------------------------------------------------
protected-mode yes
tcp-keepalive 300

# --- Logging -----------------------------------------------------------------
loglevel notice
