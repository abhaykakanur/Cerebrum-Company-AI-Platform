# ==============================================================================
# Cerebrum — Application Containers
#
# Adds the backend and frontend application services on top of
# docker-compose.yml's six datastores (via `include:`, Compose v2.20+) —
# the "later implementation phase" that file's own header refers to.
# Local development that runs the backend/frontend directly on the host
# (uv run / pnpm dev) should keep using docker-compose.yml alone; this
# file is for running the FULL stack in containers, matching how it's
# actually deployed in staging/production.
#
# Run from the REPOSITORY ROOT so the root .env is picked up and both
# Dockerfiles' build contexts resolve correctly:
#   docker compose -f infrastructure/docker/docker-compose.apps.yml --env-file .env up -d --build
#
# See docs/deployment/production-deployment.md for the full guide.
# ==============================================================================

name: cerebrum

include:
  - docker-compose.yml

services:
  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: cerebrum-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      SECURITY_TRUSTED_HOSTS: ${SECURITY_TRUSTED_HOSTS:-*}
      SECURITY_CORS_ALLOWED_ORIGINS: ${SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SECURITY_TRUSTED_PROXIES: ${SECURITY_TRUSTED_PROXIES:-127.0.0.1,::1}
      JWT_SIGNING_SECRET: ${JWT_SIGNING_SECRET:?JWT_SIGNING_SECRET must be set in .env}
      # Datastore hosts use the infra compose's service names, not
      # localhost — both files share the cerebrum-network bridge, where
      # those names are the internal DNS.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cerebrum}
      POSTGRES_USER: ${POSTGRES_USER:-cerebrum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-cerebrum-documents}
      MINIO_SECURE: "false"
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - cerebrum-network
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: cerebrum-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - cerebrum-network
    depends_on:
      - backend

# No top-level `networks:` block here — Compose's `include:` merges
# docker-compose.yml's model into this project wholesale, so
# `cerebrum-network` (declared there) is already available to the
# services above without redeclaring it.
