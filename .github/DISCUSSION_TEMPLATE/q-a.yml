title: "[Q&A] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Check `docs/architecture/specification/114_Open_Questions.md`
        first — your question may already be a tracked, known ambiguity.
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you already checked?
      description: Which CES documents or code did you already look at?
    validations:
      required: false
